<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>注音聯想大挑戰</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Noto Sans TC', sans-serif;
      user-select: none; 
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      background-color: #f3f4f6;
    }

    @keyframes bounce-fast {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-10px) scale(1.05); }
    }
    .rolling-anim {
      animation: bounce-fast 0.15s infinite alternate;
      filter: blur(1px);
    }
    
    @keyframes pop-in {
      0% { transform: scale(0.8); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    .pop-anim {
      animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-gradient-to-br from-indigo-100 via-purple-50 to-pink-100">

  <div id="app" class="w-full max-w-md h-[100dvh] sm:h-[85vh] sm:rounded-[2.5rem] bg-white/80 backdrop-blur-xl shadow-2xl overflow-hidden relative flex flex-col border border-white/60">
    
    <div class="pt-12 pb-6 px-6 text-center shrink-0">
      <h1 class="text-3xl font-black text-gray-800 tracking-wider">注音聯想大挑戰</h1>
      <p class="text-gray-500 mt-2 text-sm font-bold">請說出包含這兩個注音的詞彙！</p>
    </div>

    <div class="flex-1 flex flex-col items-center justify-center px-6 gap-6 relative">
      <div class="flex gap-4 w-full justify-center">
        <div class="w-36 h-40 bg-white rounded-3xl shadow-[0_10px_30px_rgba(0,0,0,0.08)] flex items-center justify-center border-b-4 border-indigo-100 transition-all" :class="{ 'rolling-anim text-indigo-300': isRolling, 'pop-anim': !isRolling && hasRolled }">
          <span class="text-7xl font-black bg-clip-text text-transparent bg-gradient-to-br from-indigo-500 to-purple-600">{{ symbol1 }}</span>
        </div>

        <div class="w-36 h-40 bg-white rounded-3xl shadow-[0_10px_30px_rgba(0,0,0,0.08)] flex items-center justify-center border-b-4 border-pink-100 transition-all" :class="{ 'rolling-anim text-pink-300': isRolling, 'pop-anim': !isRolling && hasRolled }">
          <span class="text-7xl font-black bg-clip-text text-transparent bg-gradient-to-br from-pink-500 to-rose-500">{{ symbol2 }}</span>
        </div>
      </div>

      <div class="h-8 mt-4">
        <p v-if="!hasRolled && !isRolling" class="text-gray-400 font-bold animate-pulse">點擊下方按鈕開始</p>
        <p v-else-if="!isRolling && hasRolled" class="text-indigo-600 font-bold text-lg">誰最快想到？</p>
      </div>
    </div>

    <div class="p-8 pb-12 shrink-0">
      <button @click="rollDice" :disabled="isRolling" class="w-full relative group overflow-hidden rounded-full p-[2px] active:scale-95 transition-all duration-200 focus:outline-none disabled:opacity-80 disabled:cursor-not-allowed">
        <span class="absolute inset-0 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 rounded-full group-hover:opacity-90"></span>
        <div class="relative bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 rounded-full px-8 py-5 flex items-center justify-center gap-3">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" :class="{'animate-spin': isRolling}" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
            <circle cx="9" cy="14" r="1.5" fill="currentColor" stroke="none"/>
            <circle cx="15" cy="14" r="1.5" fill="currentColor" stroke="none"/>
            <circle cx="12" cy="18" r="1.5" fill="currentColor" stroke="none"/>
          </svg>
          <span class="text-white font-black text-2xl tracking-widest shadow-black drop-shadow-md">
            {{ isRolling ? '擲骰中...' : '擲骰子' }}
          </span>
        </div>
      </button>
    </div>
  </div>

  <script>
    const { createApp, ref } = Vue;

    createApp({
      setup() {
        const bopomofoList = ['ㄅ', 'ㄆ', 'ㄇ', 'ㄈ', 'ㄉ', 'ㄊ', 'ㄋ', 'ㄌ', 'ㄍ', 'ㄎ', 'ㄏ', 'ㄐ', 'ㄑ', 'ㄒ', 'ㄓ', 'ㄔ', 'ㄕ', 'ㄖ', 'ㄗ', 'ㄘ', 'ㄙ'];
        const symbol1 = ref('？');
        const symbol2 = ref('？');
        const isRolling = ref(false);
        const hasRolled = ref(false);

        const getRandomSymbol = () => bopomofoList[Math.floor(Math.random() * bopomofoList.length)];

        const rollDice = () => {
          if (isRolling.value) return;
          isRolling.value = true;
          hasRolled.value = false;

          let rolls = 0;
          const maxRolls = 15; 
          const speed = 60; 

          const rollInterval = setInterval(() => {
            symbol1.value = getRandomSymbol();
            symbol2.value = getRandomSymbol();
            rolls++;

            if (rolls >= maxRolls) {
              clearInterval(rollInterval);
              isRolling.value = false;
              hasRolled.value = true;
            }
          }, speed);
        };

        return { symbol1, symbol2, isRolling, hasRolled, rollDice };
      }
    }).mount('#app');
  </script>
</body>
</html>
